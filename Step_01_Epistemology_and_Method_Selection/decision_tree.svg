<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <style>
    .box { fill:#f2f0ea; stroke:#6b6b6b; stroke-width:2; rx:6; }
    .title { font: bold 14px sans-serif; fill:#111; }
    .label { font: 12px sans-serif; fill:#111; }
    .arrow { stroke:#333; stroke-width:2; fill:none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Root -->
  <rect x="320" y="20" width="260" height="40" class="box" />
  <text x="450" y="46" text-anchor="middle" class="title">Research goal</text>

  <!-- Branches -->
  <line x1="370" y1="60" x2="220" y2="140" class="arrow" />
  <line x1="450" y1="60" x2="450" y2="140" class="arrow" />
  <line x1="530" y1="60" x2="680" y2="140" class="arrow" />

  <!-- Qualitative -->
  <rect x="140" y="140" width="200" height="60" class="box" />
  <text x="240" y="170" text-anchor="middle" class="title">Exploratory / Local</text>
  <text x="240" y="188" text-anchor="middle" class="label">(Meaning, power, context)</text>
  <text x="240" y="204" text-anchor="middle" class="label">→ Interviews, Ethnography, FGDs</text>

  <!-- Quantitative -->
  <rect x="370" y="140" width="260" height="60" class="box" />
  <text x="500" y="170" text-anchor="middle" class="title">Hypothesis testing / Prevalence</text>
  <text x="500" y="188" text-anchor="middle" class="label">Are constructs measurable?</text>

  <!-- Mixed -->
  <rect x="620" y="140" width="180" height="60" class="box" />
  <text x="710" y="170" text-anchor="middle" class="title">Need both?</text>
  <text x="710" y="188" text-anchor="middle" class="label">→ Mixed methods (sequential/parallel)</text>

  <!-- Quantitative decision -->
  <line x1="450" y1="200" x2="450" y2="260" class="arrow" />
  <rect x="330" y="260" width="240" height="52" class="box" />
  <text x="450" y="283" text-anchor="middle" class="title">Constructs well-defined?</text>
  <text x="450" y="300" text-anchor="middle" class="label">Yes → Survey (scales, sampling, power)</text>

  <!-- No path -->
  <line x1="470" y1="286" x2="650" y2="360" class="arrow" />
  <rect x="560" y="360" width="220" height="56" class="box" />
  <text x="670" y="387" text-anchor="middle" class="title">No → Formative qualitative work</text>
  <text x="670" y="403" text-anchor="middle" class="label">(cognitive interviews, FGDs) → then pilot survey</text>

  <!-- Behavioral outcome path -->
  <line x1="430" y1="286" x2="210" y2="360" class="arrow" />
  <rect x="120" y="360" width="220" height="56" class="box" />
  <text x="230" y="387" text-anchor="middle" class="title">Behavioral outcomes important?</text>
  <text x="230" y="403" text-anchor="middle" class="label">Yes → add behavioral tasks or objective data</text>

  <!-- Footer note -->
  <text x="450" y="560" text-anchor="middle" class="label">Choose pragmatically: mixed methods when both depth and breadth are required.</text>

</svg>
