
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrap { padding: 1rem 0; }
.controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center; }
.filter-btn { font-size: 12px; padding: 4px 10px; border-radius: 999px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; transition: all 0.15s; }
.filter-btn.active { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-primary); font-weight: 500; }
.search { font-size: 13px; padding: 5px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); width: 200px; }
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
th { text-align: left; font-weight: 500; font-size: 12px; color: var(--color-text-secondary); padding: 6px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); white-space: nowrap; }
td { padding: 8px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); vertical-align: top; color: var(--color-text-primary); line-height: 1.5; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--color-background-secondary); }
.badge { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 999px; font-weight: 500; white-space: nowrap; }
.cat-nature { background: #E1F5EE; color: #085041; }
.cat-value { background: #EEEDFE; color: #3C3489; }
.cat-affect { background: #FAEEDA; color: #633806; }
.cat-identity { background: #E6F1FB; color: #0C447C; }
.cat-attitude { background: #FAECE7; color: #712B13; }
.cat-wellbeing { background: #EAF3DE; color: #27500A; }
.verify { font-size: 11px; color: var(--color-text-secondary); font-style: italic; }
.flag { color: #BA7517; font-size: 11px; font-weight: 500; }
col.c1 { width: 9%; }
col.c2 { width: 13%; }
col.c3 { width: 8%; }
col.c4 { width: 22%; }
col.c5 { width: 20%; }
col.c6 { width: 28%; }
.hidden { display: none; }
.count { font-size: 12px; color: var(--color-text-secondary); margin-left: auto; }
</style>
<div class="wrap">
<h2 class="sr-only">Psychometric scales reference table for socio-ecological research</h2>
<div class="controls">
  <button class="filter-btn active" onclick="filter('all',this)">All</button>
  <button class="filter-btn" onclick="filter('nature',this)">Nature connectedness</button>
  <button class="filter-btn" onclick="filter('value',this)">Values / orientations</button>
  <button class="filter-btn" onclick="filter('attitude',this)">Attitudes</button>
  <button class="filter-btn" onclick="filter('identity',this)">Identity</button>
  <button class="filter-btn" onclick="filter('affect',this)">Affect</button>
  <button class="filter-btn" onclick="filter('wellbeing',this)">Wellbeing</button>
  <span class="count" id="count"></span>
</div>
<div class="controls">
  <input class="search" type="text" placeholder="Search scales..." oninput="search(this.value)" />
</div>
<div class="tbl-wrap">
<table id="tbl">
  <colgroup>
    <col class="c1"><col class="c2"><col class="c3"><col class="c4"><col class="c5"><col class="c6">
  </colgroup>
  <thead>
    <tr>
      <th>Abbrev.</th><th>Full name</th><th>Category</th><th>What it measures</th><th>Items / format</th><th>Citation</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
</div>
</div>

const catClasses = {
  nature: "cat-nature",
  value: "cat-value",
  affect: "cat-affect",
  identity: "cat-identity",
  attitude: "cat-attitude",
  wellbeing: "cat-wellbeing"
};

let currentCat = "all";
let currentSearch = "";

function renderTable() {
  const tbody = document.getElementById("tbody");
  const rows = scales.filter(s => {
    const matchCat = currentCat === "all" || s.cat === currentCat;
    const q = currentSearch.toLowerCase();
    const matchSearch = !q || s.abbr.toLowerCase().includes(q) || s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });
  document.getElementById("count").textContent = rows.length + " scale" + (rows.length !== 1 ? "s" : "");
  tbody.innerHTML = rows.map(s => `
    <tr>
      <td style="font-weight:500;">${s.abbr}</td>
      <td>${s.name}</td>
      <td><span class="badge ${catClasses[s.cat]}">${s.catLabel}</span></td>
      <td>${s.desc}</td>
      <td style="color:var(--color-text-secondary);">${s.items}</td>
      <td style="font-size:12px; color:var(--color-text-secondary);">${s.cite}${s.flag ? ' <span class="flag">⚑ verify</span>' : ''}</td>
    </tr>
  `).join("");
}

function filter(cat, btn) {
  currentCat = cat;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderTable();
}

function search(val) {
  currentSearch = val;
  renderTable();
}

renderTable();
</script>
